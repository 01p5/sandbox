[defaults]
inventory = ../deployment/inventory.ini
host_key_checking = False
retry_files_enabled = False
stdout_callback = yaml
deprecation_warnings = False
interpreter_python = auto_silent

[ssh_connection]
# Keep long-running tasks (the image build) alive over SSH.
ssh_args = -o ControlMaster=auto -o ControlPersist=120s -o ServerAliveInterval=30 -o ServerAliveCountMax=240
pipelining = True
