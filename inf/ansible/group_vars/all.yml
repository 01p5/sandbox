---
# Deploy parameters for the Olympus AWS demo. No secrets here — provider
# keys come in via --extra-vars (see deploy.sh / the README).

k8s_version: "1.30"
pod_cidr: "192.168.0.0/16"
dashboard_node_port: 30093

olympus_repo_url: "https://github.com/01p5/01p5.git"
# Pinned to the inventory-from-terraform branch for the demo (selfProtect toggle
# + /inventory/sync-terraform endpoint). Move back to "main" once merged.
olympus_repo_ref: "feat/inventory-from-terraform"
olympus_namespace: "olympus"
olympus_release: "olympus"
image_tag: "llm"
olympus_router: "manual" # or "llm" (needs a provider key)

# S2.E1 — sibling sub-dashboards (slurm-mgr + gpu-watch). Each is
# built into its own image on the worker (build-{slurm,gpu}-dashboard.sh)
# and deployed alongside Olympus when the respective subchart is enabled.
slurm_mgr_repo_url: "https://github.com/01p5/slurm-mgr.git"
slurm_mgr_repo_ref: "main"
gpu_watch_repo_url: "https://github.com/01p5/gpu-watch.git"
gpu_watch_repo_ref: "main"

# Set these to your own domain. deploy.sh overrides them from env.sh
# (DEPLOY_DNS_HOSTNAME / DEPLOY_CERTBOT_EMAIL) so the public repo stays generic.
dns_hostname: "olympus.example.com"
certbot_email: "admin@example.com"

# NetDB (IPAM/DNS/DHCP) — optional, wired into Olympus's sysadmin agent over
# MCP. Stand up the persistent DNS server with `deploy.sh netdb-up` (see
# inf/netdb), then set netdb_mcp_host to the EIP it prints + redeploy. EMPTY
# = netdb not wired (mcpServers renders "[]").
netdb_mcp_host: ""
netdb_delegated_zone: "lab.example.com"
certbot_staging: "0" # "1" for Let's Encrypt staging while iterating

# Overridden at runtime via --extra-vars; default empty so the chart's
# optional secret keys are simply omitted.
openai_api_key: ""
anthropic_api_key: ""

# Auth + hardening (chart maps these onto OLYMPUS_AUTH_* / OLYMPUS_DEMO_*
# envs on the dashboard pod). Demo-safe defaults: login bypass off, redirect
# back to the configured hostname. Set auth_allowed_domains to YOUR domain(s)
# (comma-separated) via env.sh (DEPLOY_AUTH_ALLOWED_DOMAINS); "*" allows any
# authenticated email. Empty here so a reproducer must opt in explicitly.
auth_bypass: "false"
auth_allowed_domains: ""
# Super-admins for /admin (csv of exact emails, "*@domain", or "*").
# Set via env.sh (DEPLOY_AUTH_ADMIN_EMAILS), e.g. "*@tianleyu.com".
auth_admin_emails: ""
# Self-protection master switch. true (default elsewhere) = agents can't manage
# Olympus's own namespace/nodes. false ONLY for this throwaway single-tenant
# sandbox, so the agents can drive the cluster itself for the demo.
self_protect: "false"
auth_redirect_base_url: "https://{{ dns_hostname }}"
auth_cookie_secure: "true"
auth_session_ttl_seconds: 604800

smtp_host: ""
smtp_port: 587
smtp_username: ""
smtp_from: "noreply@{{ dns_hostname }}"
smtp_starttls: "true"
otp_ttl_seconds: 600
otp_rate_limit_seconds: 60

# demo_mode trade-off: when true, the approval gate is AlwaysReject so
# destructive verbs (delete_pod, run_module, tf_apply, …) get auto-killed
# even for read-only intents like ``run_module module=command df -h``.
# Off here so the public demo can show end-to-end ansible/sysadmin
# execution against the seeded cp + w1 inventory; the approval card in
# the right sidebar still gates each call, and any allowlisted reviewer
# would have to actively Approve. A future demo-only chart will pin a
# tighter read-only-by-construction tool subset and re-enable hard reject.
demo_mode: "false"
daily_cost_cap_usd: "5.0"

# Secrets supplied at runtime via --extra-vars (deploy.sh / env.sh).
# Empty defaults so the chart leaves the corresponding env unset.
session_secret: ""
google_client_id: ""
google_client_secret: ""
smtp_password: ""
