---
# Olympus AWS demo — kubeadm cluster + dashboard + TLS front.
# Run from inf/ansible against the Terraform-generated inventory:
#   ansible-playbook site.yml -e openai_api_key=... (optional)

# ----------------------------------------------------------------------------
# 1) Common prereqs on every node (containerd + docker + kubeadm stack).
# ----------------------------------------------------------------------------
- name: Common prereqs
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Run prereqs script
      ansible.builtin.script: files/prereqs.sh
      args:
        executable: /bin/bash
      environment:
        K8S_VERSION: "{{ k8s_version }}"

# ----------------------------------------------------------------------------
# 2) Control plane: kubeadm init, Calico, Helm-deploy Olympus, TLS front.
# ----------------------------------------------------------------------------
- name: Control plane
  hosts: control_plane
  become: true
  gather_facts: false
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  tasks:
    - name: Allow host nginx to reach the NodePort via 127.0.0.1
      ansible.posix.sysctl:
        name: net.ipv4.conf.all.route_localnet
        value: "1"
        sysctl_set: true
        reload: true
      ignore_errors: true # collection may be absent; fall back below
      register: rl

    - name: route_localnet fallback (no ansible.posix)
      ansible.builtin.shell: |
        sysctl -w net.ipv4.conf.all.route_localnet=1
        echo 'net.ipv4.conf.all.route_localnet=1' >/etc/sysctl.d/99-route-localnet.conf
      when: rl is failed
      changed_when: true

    - name: kubeadm init
      ansible.builtin.command: >
        kubeadm init
        --apiserver-advertise-address={{ node_ip }}
        --pod-network-cidr={{ pod_cidr }}
      args:
        creates: /etc/kubernetes/admin.conf

    - name: Wait for kube-apiserver
      ansible.builtin.command: kubectl get --raw=/healthz
      register: apihealth
      until: apihealth.rc == 0
      retries: 40
      delay: 5
      changed_when: false

    - name: Install Calico CNI
      ansible.builtin.command: >
        kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.27.3/manifests/calico.yaml
      register: calico
      changed_when: "'created' in calico.stdout or 'configured' in calico.stdout"

    - name: Install Helm
      ansible.builtin.shell: curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm

    - name: Clone Olympus repo (for the chart)
      ansible.builtin.git:
        repo: "{{ olympus_repo_url }}"
        version: "{{ olympus_repo_ref }}"
        dest: /opt/olympus-src
        depth: 1
        force: true

    - name: Ensure namespace
      ansible.builtin.shell: >
        kubectl create namespace {{ olympus_namespace }}
        --dry-run=client -o yaml | kubectl apply -f -
      register: ns
      changed_when: "'created' in ns.stdout"

    # Stage the cluster's SSH private key onto the cp host so the secret
    # task below can ship it as ``ssh_k8s_pem`` (the chart mounts that
    # at /etc/olympus/ssh/k8s.pem, mode 0600). The dashboard's
    # ``olympus-inventory`` bootstrap (Play 5) reads it from there and
    # writes it into the user-managed inventory store so the sysadmin /
    # ansible agents can ssh between cluster nodes from inside the pod.
    - name: Stage k8s.pem on cp for secret creation
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../deployment/k8s.pem"
        dest: /tmp/olympus-bootstrap-k8s-pem
        mode: "0600"
      no_log: true

    - name: Provider-key + auth secret (always, includes ssh key for bootstrap)
      ansible.builtin.shell: >
        kubectl -n {{ olympus_namespace }} create secret generic {{ olympus_release }}-secrets
        --from-file=ssh_k8s_pem=/tmp/olympus-bootstrap-k8s-pem
        {% if openai_api_key       | length > 0 %}--from-literal=openai_api_key={{ openai_api_key }}{% endif %}
        {% if anthropic_api_key    | length > 0 %}--from-literal=anthropic_api_key={{ anthropic_api_key }}{% endif %}
        {% if session_secret       | length > 0 %}--from-literal=session_secret={{ session_secret }}{% endif %}
        {% if google_client_id     | length > 0 %}--from-literal=google_client_id={{ google_client_id }}{% endif %}
        {% if google_client_secret | length > 0 %}--from-literal=google_client_secret={{ google_client_secret }}{% endif %}
        {% if smtp_password        | length > 0 %}--from-literal=smtp_password={{ smtp_password }}{% endif %}
        --dry-run=client -o yaml | kubectl apply -f -
      no_log: true
      changed_when: true

    - name: Clean up staged k8s.pem
      ansible.builtin.file:
        path: /tmp/olympus-bootstrap-k8s-pem
        state: absent
      no_log: true

    # S1.2 (2026-05-30): the synthetic gpu-mcp + slurm-mcp ConfigMap
    # tasks that used to live here are gone. The dashboard image now
    # bundles the real slurm-mcp + gpu-mcp packages (from the sibling
    # repos slurm-mgr + gpu-watch, pinned by SHA in 01p5 Dockerfile)
    # so the entry points are on PATH natively. Whatever lingering
    # ConfigMap from a previous run is deleted defensively below.
    - name: Remove legacy olympus-hpc-demo-mcp ConfigMap (no longer used)
      ansible.builtin.command: >
        kubectl -n {{ olympus_namespace }} delete configmap olympus-hpc-demo-mcp
        --ignore-not-found=true
      changed_when: false

    # S2.E1 followup — earlier rollout templated PVCs that the kubeadm
    # cluster couldn't bind (no default StorageClass). 01p5 commit
    # b90eb6d flipped the chart default to persistence.enabled=false
    # but helm won't reap orphaned PVCs on chart upgrade. Defensive
    # delete so the namespace state matches the chart.
    - name: Remove orphaned sibling-dashboard PVCs (no provisioner on sandbox)
      ansible.builtin.command: >
        kubectl -n {{ olympus_namespace }} delete pvc
        olympus-olympus-slurm-dashboard-hosts olympus-olympus-gpu-dashboard-hosts
        --ignore-not-found=true
      changed_when: false

    # S1.3 — HPC hosts.json Secret. Optional. Operator drops real
    # files into inf/hpc-hosts/{slurm-hosts.json,gpu-hosts.json} and
    # they get mounted into the dashboard pod at /etc/olympus/hpc/.
    # If either file is absent we still create the Secret (with
    # whichever files exist) so the volume mount succeeds; missing
    # keys are tolerated by the slurmlib / gpuwatchlib registries
    # (Path.exists() false → empty cluster list, no crash).
    - name: Detect local hpc-hosts files
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../hpc-hosts/{{ item }}"
      register: hpc_hosts_stat
      loop:
        - slurm-hosts.json
        - gpu-hosts.json

    - name: Stage hpc-hosts files for Secret
      ansible.builtin.copy:
        src: "{{ item.stat.path }}"
        dest: "/tmp/olympus-hpc-hosts/{{ item.item }}"
        mode: "0600"
      when: item.stat.exists
      loop: "{{ hpc_hosts_stat.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Ensure /tmp/olympus-hpc-hosts exists (even if empty)
      ansible.builtin.file:
        path: /tmp/olympus-hpc-hosts
        state: directory
        mode: "0700"

    - name: Create olympus-hpc-hosts Secret from staged files
      ansible.builtin.shell:
        cmd: |
          set -e
          cd /tmp/olympus-hpc-hosts
          # --from-file accepts repeated args; build them dynamically so
          # missing files don't break the kubectl invocation.
          ARGS=""
          for f in slurm-hosts.json gpu-hosts.json; do
            if [ -f "$f" ]; then ARGS="$ARGS --from-file=$f"; fi
          done
          kubectl -n {{ olympus_namespace }} create secret generic olympus-hpc-hosts \
            $ARGS --dry-run=client -o yaml | kubectl apply -f -
      changed_when: true

    - name: Clean up staged hpc-hosts dir
      ansible.builtin.file:
        path: /tmp/olympus-hpc-hosts
        state: absent

    - name: Render Helm values (auth + hardening + HPC hosts mount)
      ansible.builtin.copy:
        dest: /tmp/olympus-values.yaml
        mode: "0600"
        content: |
          auth:
            bypass: {{ auth_bypass }}
            allowedDomains: "{{ auth_allowed_domains }}"
            redirectBaseUrl: "{{ auth_redirect_base_url }}"
            cookieSecure: {{ auth_cookie_secure }}
            sessionTtlSeconds: {{ auth_session_ttl_seconds }}
            smtpHost: "{{ smtp_host }}"
            smtpPort: {{ smtp_port }}
            smtpUsername: "{{ smtp_username }}"
            smtpFrom: "{{ smtp_from }}"
            smtpStarttls: {{ smtp_starttls }}
            otpTtlSeconds: {{ otp_ttl_seconds }}
            otpRateLimitSeconds: {{ otp_rate_limit_seconds }}
          hardening:
            demoMode: {{ demo_mode }}
            dailyCostCapUsd: "{{ daily_cost_cap_usd }}"
          # S2.E1 — sibling dashboards. The chart's subcharts spin up
          # slurm-dashboard + gpu-dashboard pods + ClusterIP services
          # in this namespace; Olympus reverse-proxies /slurm/* and
          # /gpu/* into them via OLYMPUS_PROXY_*_URL below.
          slurmDashboard:
            enabled: true
          gpuDashboard:
            enabled: true
          # netdb (IPAM/DNS/DHCP) MCP — grafts onto the sysadmin agent. Only
          # populated when netdb_mcp_host is set (the persistent DNS server's
          # EIP; see inf/netdb + `deploy.sh netdb-up`). Renders "[]" otherwise
          # (no servers). The 23 destructive verbs route through approval.
          mcpServers: |
            [{% if netdb_mcp_host | default('') %}{"name":"netdb","target_agent":"sysadmin","transport":"http","url":"http://{{ netdb_mcp_host }}:8080/mcp","destructive":["create_host","update_host","delete_host","create_nic","delete_nic","create_ip","delete_ip","create_subnet","update_subnet","delete_subnet","link_subnet_zone","unlink_subnet_zone","create_zone","delete_zone","create_provider","delete_provider","link_zone_provider","unlink_zone_provider","create_manual_dns","delete_dns_record","dns_sync_now","kea_sync_now","kea_poll_leases"]}{% endif %}]
          # HPC hosts.json mount — feeds slurm-mcp + gpu-mcp the
          # cluster registry the real packages expect (S1.3). The
          # Secret is optional; if either key is missing, the
          # corresponding MCP server starts with an empty cluster
          # list (no crash). Env-var override (SLURM_MGR_HOSTS /
          # GPU_WATCH_HOSTS) is how slurmlib / gpuwatchlib find
          # files outside ~/.
          extraEnv:
            - name: SLURM_MGR_HOSTS
              value: /etc/olympus/hpc/slurm-hosts.json
            - name: GPU_WATCH_HOSTS
              value: /etc/olympus/hpc/gpu-hosts.json
            # S2.C2 — reverse-proxy targets for the sibling dashboards.
            # The chart's slurm-dashboard.yaml + gpu-dashboard.yaml
            # name the services <release>-olympus-{slurm,gpu}-dashboard
            # so Olympus's in-cluster DNS resolves them by short name.
            - name: OLYMPUS_PROXY_SLURM_URL
              value: "http://{{ olympus_release }}-olympus-slurm-dashboard:8770"
            - name: OLYMPUS_PROXY_GPU_URL
              value: "http://{{ olympus_release }}-olympus-gpu-dashboard:8780"
          extraVolumes:
            - name: hpc-hosts
              secret:
                secretName: olympus-hpc-hosts
                defaultMode: 384  # 0600 — file holds SSH connection info
                optional: true
          extraVolumeMounts:
            - name: hpc-hosts
              mountPath: /etc/olympus/hpc
              readOnly: true
      no_log: true

    - name: Deploy dashboard (Helm)
      ansible.builtin.command: >
        helm upgrade --install {{ olympus_release }} /opt/olympus-src/infra/k8s/charts/olympus
        --namespace {{ olympus_namespace }}
        --values /tmp/olympus-values.yaml
        --set image.repository=olympus/dashboard
        --set image.tag={{ image_tag }}
        --set image.pullPolicy=Never
        --set dashboard.router={{ olympus_router }}
        --set service.type=NodePort
        --set service.port=80
        --set service.targetPort=8765
      register: helmout
      changed_when: "'has been upgraded' in helmout.stdout or 'has been installed' in helmout.stdout"

    - name: Pin the dashboard NodePort
      ansible.builtin.shell: >
        kubectl -n {{ olympus_namespace }} patch svc {{ olympus_release }}-olympus --type merge
        -p '{"spec":{"type":"NodePort","ports":[{"name":"http","port":80,"targetPort":8765,"nodePort":{{ dashboard_node_port }}}]}}'
      changed_when: true

    - name: Generate worker join command
      ansible.builtin.command: kubeadm token create --print-join-command
      register: joincmd
      changed_when: false

    - name: Stash join command for the workers
      ansible.builtin.set_fact:
        kube_join_command: "{{ joincmd.stdout }}"

    # --- TLS front (webfront: nginx + certbot) ---
    - name: Copy webfront stack
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../webfront/"
        dest: /opt/webfront/
        mode: preserve

    - name: Write domains.conf (hostname -> dashboard NodePort)
      ansible.builtin.copy:
        content: "{{ dns_hostname }}:{{ dashboard_node_port }}\n"
        dest: /opt/webfront/domains.conf

    - name: Wait for DNS to resolve to this node (best-effort, so HTTP-01 doesn't waste attempts)
      ansible.builtin.shell: "getent hosts {{ dns_hostname }} | awk '{print $1}' | head -1"
      register: dnsres
      until: dnsres.stdout == public_ip
      retries: 60
      delay: 10
      changed_when: false
      failed_when: false

    - name: Bring up the TLS front
      ansible.builtin.command: docker compose up -d
      args:
        chdir: /opt/webfront
      environment:
        CERTBOT_EMAIL: "{{ certbot_email }}"
        CERTBOT_STAGING: "{{ certbot_staging | string }}"
      changed_when: true

# ----------------------------------------------------------------------------
# 3) Worker: build + import the image, then join.
# ----------------------------------------------------------------------------
- name: Worker
  hosts: workers
  become: true
  gather_facts: false
  tasks:
    - name: Build + import the Olympus image (slow — multi-stage build, runs synchronously over SSH)
      ansible.builtin.script: files/build-image.sh
      args:
        executable: /bin/bash
      environment:
        OLYMPUS_REPO_URL: "{{ olympus_repo_url }}"
        OLYMPUS_REPO_REF: "{{ olympus_repo_ref }}"
        IMAGE_TAG: "{{ image_tag }}"

    # S2.E1 — sibling dashboards. Built from the public slurm-mgr +
    # gpu-watch repos at the pinned refs (group_vars/all.yml). Same
    # fast-path-skip-if-unchanged pattern as build-image.sh.
    - name: Build + import slurm-dashboard image
      ansible.builtin.script: files/build-slurm-dashboard.sh
      args:
        executable: /bin/bash
      environment:
        SLURM_MGR_REPO_URL: "{{ slurm_mgr_repo_url }}"
        SLURM_MGR_REF: "{{ slurm_mgr_repo_ref }}"
        IMAGE_TAG: "dev"

    - name: Build + import gpu-dashboard image
      ansible.builtin.script: files/build-gpu-dashboard.sh
      args:
        executable: /bin/bash
      environment:
        GPU_WATCH_REPO_URL: "{{ gpu_watch_repo_url }}"
        GPU_WATCH_REF: "{{ gpu_watch_repo_ref }}"
        IMAGE_TAG: "dev"

    - name: Join the cluster
      ansible.builtin.command: "{{ hostvars[groups['control_plane'][0]].kube_join_command }}"
      args:
        creates: /etc/kubernetes/kubelet.conf

# ----------------------------------------------------------------------------
# 4) Roll the dashboard pod after the worker rebuilt the :llm image.
#    `pullPolicy=Never` + same tag means helm sees no diff; we have to
#    force the rollout ourselves so the new local image bytes get used.
# ----------------------------------------------------------------------------
- name: Roll the dashboard to pick up the freshly-built image
  hosts: control_plane
  become: true
  gather_facts: false
  tasks:
    - name: Rollout restart deployments (Olympus + sibling dashboards)
      ansible.builtin.command: >
        kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ olympus_namespace }}
        rollout restart deployment/{{ item }}
      register: rollout
      changed_when: "'restarted' in rollout.stdout"
      # pullPolicy=Never + same tag means helm sees no diff; the only
      # way the kubelet picks up freshly-imported image bytes is via
      # an explicit rollout restart. Sibling deployments share the
      # same lifecycle.
      loop:
        - "{{ olympus_release }}-olympus"
        - "{{ olympus_release }}-olympus-slurm-dashboard"
        - "{{ olympus_release }}-olympus-gpu-dashboard"

    - name: Wait for each deployment to be Ready
      ansible.builtin.command: >
        kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ olympus_namespace }}
        rollout status deployment/{{ item }} --timeout=180s
      changed_when: false
      loop:
        - "{{ olympus_release }}-olympus"
        - "{{ olympus_release }}-olympus-slurm-dashboard"
        - "{{ olympus_release }}-olympus-gpu-dashboard"

# ----------------------------------------------------------------------------
# 5) Seed the user-managed inventory store with this cluster's own hosts.
#    Idempotent: only seeds when the inventory file is empty (a fresh
#    install / a wiped PVC), so subsequent runs preserve user edits.
#    The dashboard pod runs olympus-inventory against /var/lib/olympus
#    (same mounted dir as the audit log) + reads the cluster SSH key
#    from /etc/olympus/ssh/k8s.pem (mounted by the chart via the
#    ssh_k8s_pem Secret key the previous play populated).
# ----------------------------------------------------------------------------
- name: Bootstrap Olympus inventory (cp + w1 + cluster ssh key)
  hosts: control_plane
  become: true
  gather_facts: false
  vars:
    _kubectl_exec_prefix: >-
      kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ olympus_namespace }}
      exec deploy/{{ olympus_release }}-olympus --
  tasks:
    # Idempotent-by-CLI: olympus-inventory returns rc=1 + "already exists"
    # on duplicate add. failed_when tolerates that, and changed_when looks
    # for the success path ("added key" / "added host"), so a re-run is
    # a no-op (ok=3 changed=0) without needing a separate guard task.
    # Earlier-attempt note: a `kubectl exec ... 2>&1 | head -1` precheck
    # accidentally captured kubectl's "Defaulted container" stderr line as
    # the first line, so the seed-when guard always evaluated false.
    - name: Seed cluster SSH key
      ansible.builtin.command: >
        {{ _kubectl_exec_prefix }}
        olympus-inventory --store /var/lib/olympus/inventory.json
        add-key --name cluster --file /etc/olympus/ssh/k8s.pem
      register: seed_key
      changed_when: "'added key' in seed_key.stdout"
      failed_when:
        - seed_key.rc != 0
        - "'already exists' not in seed_key.stderr"

    - name: Seed cp host
      ansible.builtin.command: >
        {{ _kubectl_exec_prefix }}
        olympus-inventory --store /var/lib/olympus/inventory.json
        add-host --name cp
        --address {{ hostvars[groups['control_plane'][0]].node_ip }}
        --ssh-user ubuntu --key cluster
        --group control_plane
        --var role=control_plane
        --description "Auto-bootstrapped: this cluster's control plane node"
      register: seed_cp
      changed_when: "'added host' in seed_cp.stdout"
      failed_when:
        - seed_cp.rc != 0
        - "'already exists' not in seed_cp.stderr"

    - name: Seed w1 host
      ansible.builtin.command: >
        {{ _kubectl_exec_prefix }}
        olympus-inventory --store /var/lib/olympus/inventory.json
        add-host --name w1
        --address {{ hostvars[groups['workers'][0]].node_ip }}
        --ssh-user ubuntu --key cluster
        --group workers
        --var role=worker
        --description "Auto-bootstrapped: this cluster's worker node"
      register: seed_w1
      changed_when: "'added host' in seed_w1.stdout"
      failed_when:
        - seed_w1.rc != 0
        - "'already exists' not in seed_w1.stderr"

    # Seed any hosts declared via the terraform `olympus_inventory_hosts` output
    # (written by terraform to deployment/inventory_hosts.json). Lets a
    # provisioned host auto-register without a manual add. The file is read on
    # the ansible controller (lookup); the add runs in the pod. Idempotent.
    - name: Seed terraform-declared inventory hosts
      ansible.builtin.command: >
        {{ _kubectl_exec_prefix }}
        olympus-inventory --store /var/lib/olympus/inventory.json
        add-host --name {{ item.name }}
        --address {{ item.address }}
        --ssh-user {{ item.ssh_user | default('ubuntu') }}
        --ssh-port {{ item.ssh_port | default(22) }}
        {% if item.key | default('') %}--key {{ item.key }}{% endif %}
        {% for g in item.groups | default([]) %} --group {{ g }}{% endfor %}
        {% for k, v in (item.vars | default({})).items() %} --var {{ k }}={{ v }}{% endfor %}
      loop: >-
        {{ (lookup('file', playbook_dir + '/../deployment/inventory_hosts.json',
            errors='ignore') | default('[]', true)) | from_json }}
      loop_control:
        label: "{{ item.name }}"
      register: seed_tf_hosts
      changed_when: "'added host' in seed_tf_hosts.stdout"
      failed_when:
        - seed_tf_hosts.rc != 0
        - "'already exists' not in seed_tf_hosts.stderr"

    - name: Confirm the inventory after bootstrap
      ansible.builtin.command: >
        {{ _kubectl_exec_prefix }}
        olympus-inventory --store /var/lib/olympus/inventory.json list-hosts
      register: inv_final
      changed_when: false

    - name: Report
      ansible.builtin.debug:
        msg: |
          Olympus inventory after bootstrap:
          {{ inv_final.stdout }}
