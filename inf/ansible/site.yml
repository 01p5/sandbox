---
# Olympus AWS demo — kubeadm cluster + dashboard + TLS front.
# Run from inf/ansible against the Terraform-generated inventory:
#   ansible-playbook site.yml -e openai_api_key=... (optional)

# ----------------------------------------------------------------------------
# 1) Common prereqs on every node (containerd + docker + kubeadm stack).
# ----------------------------------------------------------------------------
- name: Common prereqs
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Run prereqs script
      ansible.builtin.script: files/prereqs.sh
      args:
        executable: /bin/bash
      environment:
        K8S_VERSION: "{{ k8s_version }}"

# ----------------------------------------------------------------------------
# 2) Control plane: kubeadm init, Calico, Helm-deploy Olympus, TLS front.
# ----------------------------------------------------------------------------
- name: Control plane
  hosts: control_plane
  become: true
  gather_facts: false
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  tasks:
    - name: Allow host nginx to reach the NodePort via 127.0.0.1
      ansible.posix.sysctl:
        name: net.ipv4.conf.all.route_localnet
        value: "1"
        sysctl_set: true
        reload: true
      ignore_errors: true # collection may be absent; fall back below
      register: rl

    - name: route_localnet fallback (no ansible.posix)
      ansible.builtin.shell: |
        sysctl -w net.ipv4.conf.all.route_localnet=1
        echo 'net.ipv4.conf.all.route_localnet=1' >/etc/sysctl.d/99-route-localnet.conf
      when: rl is failed
      changed_when: true

    - name: kubeadm init
      ansible.builtin.command: >
        kubeadm init
        --apiserver-advertise-address={{ node_ip }}
        --pod-network-cidr={{ pod_cidr }}
      args:
        creates: /etc/kubernetes/admin.conf

    - name: Wait for kube-apiserver
      ansible.builtin.command: kubectl get --raw=/healthz
      register: apihealth
      until: apihealth.rc == 0
      retries: 40
      delay: 5
      changed_when: false

    - name: Install Calico CNI
      ansible.builtin.command: >
        kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.27.3/manifests/calico.yaml
      register: calico
      changed_when: "'created' in calico.stdout or 'configured' in calico.stdout"

    - name: Install Helm
      ansible.builtin.shell: curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm

    - name: Clone Olympus repo (for the chart)
      ansible.builtin.git:
        repo: "{{ olympus_repo_url }}"
        version: "{{ olympus_repo_ref }}"
        dest: /opt/olympus-src
        depth: 1
        force: true

    - name: Ensure namespace
      ansible.builtin.shell: >
        kubectl create namespace {{ olympus_namespace }}
        --dry-run=client -o yaml | kubectl apply -f -
      register: ns
      changed_when: "'created' in ns.stdout"

    # Stage the cluster's SSH private key onto the cp host so the secret
    # task below can ship it as ``ssh_k8s_pem`` (the chart mounts that
    # at /etc/olympus/ssh/k8s.pem, mode 0600). The dashboard's
    # ``olympus-inventory`` bootstrap (Play 5) reads it from there and
    # writes it into the user-managed inventory store so the sysadmin /
    # ansible agents can ssh between cluster nodes from inside the pod.
    - name: Stage k8s.pem on cp for secret creation
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../deployment/k8s.pem"
        dest: /tmp/olympus-bootstrap-k8s-pem
        mode: "0600"
      no_log: true

    - name: Provider-key + auth secret (always, includes ssh key for bootstrap)
      ansible.builtin.shell: >
        kubectl -n {{ olympus_namespace }} create secret generic {{ olympus_release }}-secrets
        --from-file=ssh_k8s_pem=/tmp/olympus-bootstrap-k8s-pem
        {% if openai_api_key       | length > 0 %}--from-literal=openai_api_key={{ openai_api_key }}{% endif %}
        {% if anthropic_api_key    | length > 0 %}--from-literal=anthropic_api_key={{ anthropic_api_key }}{% endif %}
        {% if session_secret       | length > 0 %}--from-literal=session_secret={{ session_secret }}{% endif %}
        {% if google_client_id     | length > 0 %}--from-literal=google_client_id={{ google_client_id }}{% endif %}
        {% if google_client_secret | length > 0 %}--from-literal=google_client_secret={{ google_client_secret }}{% endif %}
        {% if smtp_password        | length > 0 %}--from-literal=smtp_password={{ smtp_password }}{% endif %}
        --dry-run=client -o yaml | kubectl apply -f -
      no_log: true
      changed_when: true

    - name: Clean up staged k8s.pem
      ansible.builtin.file:
        path: /tmp/olympus-bootstrap-k8s-pem
        state: absent
      no_log: true

    - name: Render Helm values (auth + hardening — avoids --set comma quoting)
      ansible.builtin.copy:
        dest: /tmp/olympus-values.yaml
        mode: "0600"
        content: |
          auth:
            bypass: {{ auth_bypass }}
            allowedDomains: "{{ auth_allowed_domains }}"
            redirectBaseUrl: "{{ auth_redirect_base_url }}"
            cookieSecure: {{ auth_cookie_secure }}
            sessionTtlSeconds: {{ auth_session_ttl_seconds }}
            smtpHost: "{{ smtp_host }}"
            smtpPort: {{ smtp_port }}
            smtpUsername: "{{ smtp_username }}"
            smtpFrom: "{{ smtp_from }}"
            smtpStarttls: {{ smtp_starttls }}
            otpTtlSeconds: {{ otp_ttl_seconds }}
            otpRateLimitSeconds: {{ otp_rate_limit_seconds }}
          hardening:
            demoMode: {{ demo_mode }}
            dailyCostCapUsd: "{{ daily_cost_cap_usd }}"
      no_log: true

    - name: Deploy dashboard (Helm)
      ansible.builtin.command: >
        helm upgrade --install {{ olympus_release }} /opt/olympus-src/infra/k8s/charts/olympus
        --namespace {{ olympus_namespace }}
        --values /tmp/olympus-values.yaml
        --set image.repository=olympus/dashboard
        --set image.tag={{ image_tag }}
        --set image.pullPolicy=Never
        --set dashboard.router={{ olympus_router }}
        --set service.type=NodePort
        --set service.port=80
        --set service.targetPort=8765
      register: helmout
      changed_when: "'has been upgraded' in helmout.stdout or 'has been installed' in helmout.stdout"

    - name: Pin the dashboard NodePort
      ansible.builtin.shell: >
        kubectl -n {{ olympus_namespace }} patch svc {{ olympus_release }}-olympus --type merge
        -p '{"spec":{"type":"NodePort","ports":[{"name":"http","port":80,"targetPort":8765,"nodePort":{{ dashboard_node_port }}}]}}'
      changed_when: true

    - name: Generate worker join command
      ansible.builtin.command: kubeadm token create --print-join-command
      register: joincmd
      changed_when: false

    - name: Stash join command for the workers
      ansible.builtin.set_fact:
        kube_join_command: "{{ joincmd.stdout }}"

    # --- TLS front (webfront: nginx + certbot) ---
    - name: Copy webfront stack
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../webfront/"
        dest: /opt/webfront/
        mode: preserve

    - name: Write domains.conf (hostname -> dashboard NodePort)
      ansible.builtin.copy:
        content: "{{ dns_hostname }}:{{ dashboard_node_port }}\n"
        dest: /opt/webfront/domains.conf

    - name: Wait for DNS to resolve to this node (best-effort, so HTTP-01 doesn't waste attempts)
      ansible.builtin.shell: "getent hosts {{ dns_hostname }} | awk '{print $1}' | head -1"
      register: dnsres
      until: dnsres.stdout == public_ip
      retries: 60
      delay: 10
      changed_when: false
      failed_when: false

    - name: Bring up the TLS front
      ansible.builtin.command: docker compose up -d
      args:
        chdir: /opt/webfront
      environment:
        CERTBOT_EMAIL: "{{ certbot_email }}"
        CERTBOT_STAGING: "{{ certbot_staging | string }}"
      changed_when: true

# ----------------------------------------------------------------------------
# 3) Worker: build + import the image, then join.
# ----------------------------------------------------------------------------
- name: Worker
  hosts: workers
  become: true
  gather_facts: false
  tasks:
    - name: Build + import the Olympus image (slow — multi-stage build, runs synchronously over SSH)
      ansible.builtin.script: files/build-image.sh
      args:
        executable: /bin/bash
      environment:
        OLYMPUS_REPO_URL: "{{ olympus_repo_url }}"
        OLYMPUS_REPO_REF: "{{ olympus_repo_ref }}"
        IMAGE_TAG: "{{ image_tag }}"

    - name: Join the cluster
      ansible.builtin.command: "{{ hostvars[groups['control_plane'][0]].kube_join_command }}"
      args:
        creates: /etc/kubernetes/kubelet.conf

# ----------------------------------------------------------------------------
# 4) Roll the dashboard pod after the worker rebuilt the :llm image.
#    `pullPolicy=Never` + same tag means helm sees no diff; we have to
#    force the rollout ourselves so the new local image bytes get used.
# ----------------------------------------------------------------------------
- name: Roll the dashboard to pick up the freshly-built image
  hosts: control_plane
  become: true
  gather_facts: false
  tasks:
    - name: Rollout restart deployment/{{ olympus_release }}-olympus
      ansible.builtin.command: >
        kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ olympus_namespace }}
        rollout restart deployment/{{ olympus_release }}-olympus
      register: rollout
      changed_when: "'restarted' in rollout.stdout"

    - name: Wait for the new pod to become Ready
      ansible.builtin.command: >
        kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ olympus_namespace }}
        rollout status deployment/{{ olympus_release }}-olympus --timeout=180s
      changed_when: false

# ----------------------------------------------------------------------------
# 5) Seed the user-managed inventory store with this cluster's own hosts.
#    Idempotent: only seeds when the inventory file is empty (a fresh
#    install / a wiped PVC), so subsequent runs preserve user edits.
#    The dashboard pod runs olympus-inventory against /var/lib/olympus
#    (same mounted dir as the audit log) + reads the cluster SSH key
#    from /etc/olympus/ssh/k8s.pem (mounted by the chart via the
#    ssh_k8s_pem Secret key the previous play populated).
# ----------------------------------------------------------------------------
- name: Bootstrap Olympus inventory (cp + w1 + cluster ssh key)
  hosts: control_plane
  become: true
  gather_facts: false
  vars:
    _kubectl_exec_prefix: >-
      kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ olympus_namespace }}
      exec deploy/{{ olympus_release }}-olympus --
  tasks:
    # Idempotent-by-CLI: olympus-inventory returns rc=1 + "already exists"
    # on duplicate add. failed_when tolerates that, and changed_when looks
    # for the success path ("added key" / "added host"), so a re-run is
    # a no-op (ok=3 changed=0) without needing a separate guard task.
    # Earlier-attempt note: a `kubectl exec ... 2>&1 | head -1` precheck
    # accidentally captured kubectl's "Defaulted container" stderr line as
    # the first line, so the seed-when guard always evaluated false.
    - name: Seed cluster SSH key
      ansible.builtin.command: >
        {{ _kubectl_exec_prefix }}
        olympus-inventory --store /var/lib/olympus/inventory.json
        add-key --name cluster --file /etc/olympus/ssh/k8s.pem
      register: seed_key
      changed_when: "'added key' in seed_key.stdout"
      failed_when:
        - seed_key.rc != 0
        - "'already exists' not in seed_key.stderr"

    - name: Seed cp host
      ansible.builtin.command: >
        {{ _kubectl_exec_prefix }}
        olympus-inventory --store /var/lib/olympus/inventory.json
        add-host --name cp
        --address {{ hostvars[groups['control_plane'][0]].node_ip }}
        --ssh-user ubuntu --key cluster
        --group control_plane
        --var role=control_plane
        --description "Auto-bootstrapped: this cluster's control plane node"
      register: seed_cp
      changed_when: "'added host' in seed_cp.stdout"
      failed_when:
        - seed_cp.rc != 0
        - "'already exists' not in seed_cp.stderr"

    - name: Seed w1 host
      ansible.builtin.command: >
        {{ _kubectl_exec_prefix }}
        olympus-inventory --store /var/lib/olympus/inventory.json
        add-host --name w1
        --address {{ hostvars[groups['workers'][0]].node_ip }}
        --ssh-user ubuntu --key cluster
        --group workers
        --var role=worker
        --description "Auto-bootstrapped: this cluster's worker node"
      register: seed_w1
      changed_when: "'added host' in seed_w1.stdout"
      failed_when:
        - seed_w1.rc != 0
        - "'already exists' not in seed_w1.stderr"

    - name: Confirm the inventory after bootstrap
      ansible.builtin.command: >
        {{ _kubectl_exec_prefix }}
        olympus-inventory --store /var/lib/olympus/inventory.json list-hosts
      register: inv_final
      changed_when: false

    - name: Report
      ansible.builtin.debug:
        msg: |
          Olympus inventory after bootstrap:
          {{ inv_final.stdout }}
